<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancionero del Colegio Don Bosco</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <img src="logo don bosco-05.png" alt="Logo Colegio Don Bosco" class="logo">
        <h1>CANCIONERO DEL<br>COLEGIO DON BOSCO</h1>
    </header>

    <main id="index-view" class="view active">
        <div class="search-container">
            <input type="search" id="search-input" placeholder="🔍 Buscar canción...">
        </div>
        <div id="song-list" class="song-list">
            </div>
    </main>

    <main id="song-view" class="view hidden">
        <div class="song-header">
            <button id="back-btn" class="icon-btn">← Volver</button>
            <h2 id="song-title">Título de la Canción</h2>
        </div>
        
        <div class="text-controls">
            <button onclick="changeFontSize(-2)">A-</button>
            <div class="font-indicator">Tamaño de letra</div>
            <button onclick="changeFontSize(2)">A+</button>
        </div>

        <div id="song-content" class="song-content">
            </div>

        <div class="text-controls bottom-controls">
            <button onclick="changeFontSize(-2)">A-</button>
            <div class="font-indicator">Tamaño de letra</div>
            <button onclick="changeFontSize(2)">A+</button>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
